name: Process raw sensor files

on:
  push:
    branches:
      - redesign/beautiful-jekyll-style
    paths:
      - 'data/raw/**'
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy scipy openpyxl

      - name: Process raw files
        run: python src/process_all.py

      - name: Commit updated individual_data.csv
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/individual_data.csv
          git diff --cached --quiet || git commit -m "data: regenerate individual_data.csv [skip ci]"
          git push
